# Contrato canónico de ejecución para Tono Político.
#
# Schema nuevo: main.py puede ejecutar este archivo directamente con:
#   uv run python main.py --config config/config.yaml
#   uv run python main.py --config config/config.yaml --dry-run
#   uv run python main.py --config config/config.yaml --validate-config
#
# El path legacy con flags (--playlist/--topico/--resume/--discursive) sigue vivo
# temporalmente, pero el control granular del path preferido vive aquí.

schema_version: "tono-politico.run.v1"

run:
  id: null
  stages: [speech2text, argument_shape, topics_cluster, topics_approach]
  resume: true
  overwrite: false
  keep_cache: false
  fail_fast: false
  max_videos: null
  only_video_ids: []

input:
  playlist_url: "https://www.youtube.com/playlist?list=PLE9Zk7g9R__M"
  actor_transcripts_dir: null
  argumentos_path: null
  temas_path: null
  enfoques_path: null

output:
  base_dir: "output"
  run_dir: null
  persist_resolved_config: true
  persist_manifest: true

project:
  data_dir: "data"
  idioma: "es"
  random_state: 42

speech2text:
  enabled: true

  audio_fetcher:
    enabled: true
    force_download: false
    playlist_dir_template: "{playlist}"
    audio_dir_template: "videos-{playlist}"

  speaker_timestamps:
    enabled: true
    actor_objetivo: "Lilly Téllez"
    pipeline: "pyannote/speaker-diarization-community-1"
    fallback_pipeline: "pyannote-community/speaker-diarization-community-1"
    device: "auto"
    umbral_match: 0.5
    umbral_ambiguo: 0.7
    match_ambiguo: "descartar_como_otro_speaker"
    referencia_voz:
      origen: "misma_playlist"
      max_audios: 1
      video_id: "su9nURIj9XQ"
      url: "https://www.youtube.com/watch?v=su9nURIj9XQ&list=PLE9Zk7g9R__M&index=8"
      cache: "solo_ejecucion"

  transcribe_speech:
    enabled: true
    whisper_model: "large-v3-turbo"
    idioma: "es"
    word_timestamps: false
    force_retranscribe: false
    skip_existing_transcripts: true

discursive_approach:
  enabled: true

  input:
    source: "previous_stage" # previous_stage | actor_transcripts_dir
    actor_transcripts_dir: null

  argument_shape:
    enabled: true
    force: false
    spacy_model: "es_core_news_lg"
    embedding_model: "LiquidAI/LFM2.5-Embedding-350M"
    breakpoint_percentile: 95
    min_oraciones: 2
    max_oraciones: 8
    max_palabras: 150

  topics_cluster:
    enabled: true
    force: false
    embedding_model: "LiquidAI/LFM2.5-Embedding-350M"
    min_topic_size: 3
    n_neighbors: 10
    n_components: 5
    umap:
      metric: "cosine"
      random_state: 42
    hdbscan:
      min_samples: 1
      metric: "euclidean"
      cluster_selection_method: "eom"
    bertopic:
      language: "spanish"
      calculate_probabilities: false
      verbose: false

  topics_approach:
    enabled: true
    force: false
