# Defaults del proyecto Tono Político.
#
# Este archivo es la referencia viva de configuración para los services.
# Estado actual: los services reciben estos valores por constructor; todavía no
# existe un loader global/CLI que lea automáticamente este YAML.

project:
  data_dir: "data"
  idioma: "es"
  random_state: 42

# Componente 1: Ingesta — YouTube playlist -> Whisper -> VideoTranscript[]
ingesta:
  data_dir: "data"
  whisper_model: "large-v3"
  idioma: "es"

# Componente 2: Segmentación — VideoTranscript[] -> Segmento[]
segmentacion:
  spacy_model: "es_core_news_lg"
  embedding_model: "LiquidAI/LFM2.5-Embedding-350M"
  breakpoint_percentile: 95
  min_oraciones: 2
  max_oraciones: 8
  max_palabras: 150

# Componente 3: Temas — Segmento[] -> ResultadoTemas
temas:
  embedding_model: "LiquidAI/LFM2.5-Embedding-350M"
  min_topic_size: 3
  n_neighbors: 10
  n_components: 5
  umap:
    metric: "cosine"
    random_state: 42
  hdbscan:
    min_samples: 1
    metric: "euclidean"
    cluster_selection_method: "eom"
  bertopic:
    language: "spanish"
    calculate_probabilities: true
    verbose: false

# Componente 4: Filtrado — pendiente.
filtrado:
  estado: "pendiente"
  usar_topicos: true
  min_relevancia: 0.35

# Componente 5: Tono — pendiente.
tono:
  estado: "pendiente"
  modelo_base: "joeddav/xlm-roberta-large-xnli"
  sentimiento_labels: ["positivo", "negativo", "neutral"]
  stance_labels: ["a favor", "en contra", "neutral"]
  tono_primario_labels: ["populista", "técnico", "institucional"]
  tono_secundario_labels:
    - "confrontativo"
    - "conciliador"
    - "emocional"
    - "nacionalista"
    - "victimizante"

# Componente 6: Salida — pendiente.
salida:
  estado: "pendiente"
  formato: "json"
  incluir_provenance: true
